<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>QR Scanner & Generator Pro</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- jsQR library for scanning -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <!-- QRCode.js for generating -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      overflow-x: hidden;
      width: 100%;
    }

    body {
      font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #06060c;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      background-image:
        radial-gradient(ellipse at 20% 20%, #1a1030 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, #0f1a2e 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, #0a0a14 0%, #030308 100%);
      background-attachment: fixed;
    }

    .app-container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-container { animation: none; }
      .live-dot, .scan-laser { animation: none !important; }
    }

    /* Glass panel */
    .glass {
      background: rgba(16, 16, 28, 0.65);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    /* Header */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 22px 14px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand i {
      font-size: 1.6rem;
      color: #b794ff;
      filter: drop-shadow(0 0 14px #8b5cf6);
      background: linear-gradient(135deg, #3b2d60, #1e1638);
      padding: 10px;
      border-radius: 16px;
      flex-shrink: 0;
    }

    .brand h2 {
      font-weight: 650;
      font-size: 1.4rem;
      letter-spacing: -0.4px;
      background: linear-gradient(135deg, #ede4ff, #b794ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    .mode-tabs {
      display: flex;
      gap: 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 30px;
      padding: 4px;
      flex-shrink: 0;
    }

    .mode-tab {
      padding: 8px 14px;
      border-radius: 26px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      color: #a89bc7;
      transition: 0.2s;
      border: none;
      background: transparent;
      white-space: nowrap;
    }

    .mode-tab:focus-visible,
    .btn:focus-visible,
    .icon-btn:focus-visible,
    .gen-input:focus-visible {
      outline: 2px solid #b794ff;
      outline-offset: 2px;
    }

    .mode-tab.active {
      background: #5b3f9b;
      color: #fff;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 0.78rem;
      font-weight: 500;
      color: #cfc0ff;
      width: 100%;
      justify-content: center;
    }

    .live-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 12px #4ade80;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    .live-dot.off {
      background: #f87171;
      box-shadow: 0 0 10px #f87171;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.25); }
    }

    /* Scanner / Generator views */
    #scanner-view, #generator-view {
      display: none;
    }
    #scanner-view.active, #generator-view.active {
      display: block;
    }

    .viewfinder-outer {
      margin: 0 8px;
    }

    .viewfinder {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #020108;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 0 0 3px rgba(138, 110, 255, 0.5), 0 25px 45px #000000aa;
      transition: all 0.3s;
    }

    .viewfinder.active-ring {
      box-shadow: 0 0 0 4px #b794ff, 0 0 30px #7c3aed;
    }

    #qr-video, #qr-canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    #qr-canvas {
      display: none;
    }

    .frame-corners i {
      position: absolute;
      color: #c4b5fd;
      font-size: 28px;
      filter: drop-shadow(0 0 15px #a78bfa);
      opacity: 0.9;
      z-index: 2;
    }
    .fa-caret-up { top: 14px; left: 14px; }
    .fa-caret-down { bottom: 14px; right: 14px; }
    .corner-tr { top: 14px; right: 14px; }
    .corner-bl { bottom: 14px; left: 14px; }

    .scan-laser {
      position: absolute;
      left: 5%;
      width: 90%;
      height: 2.5px;
      background: linear-gradient(90deg, transparent, #d8b4fe, #a78bfa, #d8b4fe, transparent);
      box-shadow: 0 0 35px #c084fc;
      animation: laserSweep 2.8s ease-in-out infinite;
      border-radius: 4px;
      z-index: 2;
      display: none;
    }

    @keyframes laserSweep {
      0% { top: 10%; opacity: 0.6; }
      50% { top: 85%; opacity: 1; }
      100% { top: 10%; opacity: 0.6; }
    }

    /* Generator preview — fixed to behave like the scanner viewfinder */
    .generator-preview {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #fff;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 0 3px rgba(138, 110, 255, 0.5);
      padding: 24px;
    }

    #generated-qr {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #generated-qr img,
    #generated-qr canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }

    .generator-placeholder {
      color: #9b8ec0;
      font-size: 0.85rem;
      text-align: center;
      padding: 0 20px;
    }
    .generator-placeholder i {
      font-size: 2.4rem;
      display: block;
      margin-bottom: 10px;
      color: #c9b3ff;
      opacity: 0.6;
    }

    .gen-input-group {
      display: flex;
      gap: 10px;
      margin: 12px 8px 0;
    }

    .gen-input {
      flex: 1;
      min-width: 0;
      background: rgba(20, 15, 35, 0.9);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px;
      padding: 14px 18px;
      color: #f0e6ff;
      font-size: 0.9rem;
      outline: none;
    }

    .gen-input::placeholder {
      color: #7b6b9e;
    }

    /* Feature chips */
    .feature-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 12px;
      margin-top: 6px;
    }

    .chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 8px 14px;
      font-size: 0.75rem;
      color: #d0c4ff;
      display: flex;
      align-items: center;
      gap: 7px;
      backdrop-filter: blur(8px);
    }

    .chip i {
      font-size: 0.9rem;
      color: #b794ff;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 10px;
      padding: 8px 12px 4px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1 1 0;
      min-width: 70px;
      background: linear-gradient(135deg, rgba(35, 28, 55, 0.9), rgba(20, 15, 35, 0.9));
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #f0e6ff;
      padding: 15px 10px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 10px 22px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    .btn i {
      font-size: 0.95rem;
    }

    .btn.primary {
      background: linear-gradient(135deg, #5b3f9b, #35245c);
      border-color: #b392f0;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.5);
    }

    .btn:active {
      transform: scale(0.95);
      background: #3f3165;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Result panel */
    .result-panel {
      padding: 18px 20px 14px;
      margin: 0 8px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .label-row span:first-child {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #a99bc7;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-badge {
      background: #2e2350;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #d4c4ff;
      cursor: pointer;
      border: none;
      flex-shrink: 0;
    }

    .result-box {
      background: rgba(5, 3, 15, 0.8);
      border-radius: 22px;
      padding: 14px 18px;
      min-height: 55px;
      max-height: 90px;
      overflow-y: auto;
      border: 1px solid #4a3b6b;
      color: #e2d9ff;
      font-weight: 450;
      line-height: 1.4;
      word-break: break-word;
      backdrop-filter: blur(10px);
      font-size: 0.9rem;
    }

    .action-icons {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .icon-btn {
      flex: 1 1 auto;
      min-width: 56px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 40px;
      padding: 12px 8px;
      color: #cfc1ff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 500;
      font-size: 0.78rem;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .icon-btn i {
      font-size: 0.85rem;
    }

    .icon-btn:active {
      background: #5b478b;
      border-color: #c9b3ff;
    }

    .icon-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .footer-msg {
      text-align: center;
      font-size: 0.75rem;
      color: #7b6b9e;
      margin-top: 12px;
      min-height: 1.2em;
    }

    /* History dropdown */
    .history-dropdown {
      background: #141024;
      border-radius: 20px;
      margin: 8px 0 0;
      padding: 10px;
      max-height: 140px;
      overflow-y: auto;
      display: none;
      border: 1px solid #3d3060;
    }
    .history-dropdown.show {
      display: block;
    }
    .history-item {
      padding: 8px 12px;
      border-bottom: 1px solid #2d234a;
      color: #cfc0ff;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .history-item span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .history-item:hover {
      background: #2a1f45;
    }
    .history-empty {
      padding: 10px;
      color: #7b6b9e;
      font-size: 0.8rem;
    }

    /* ───────── Mobile responsive fixes ───────── */
    @media (max-width: 480px) {
      body { padding: 10px; }

      .app-container { gap: 12px; }

      .header-row {
        padding: 16px 16px 12px;
        justify-content: center;
      }

      .brand { width: 100%; justify-content: center; }
      .brand h2 { font-size: 1.25rem; }
      .brand i { font-size: 1.4rem; padding: 8px; }

      .mode-tabs { width: 100%; justify-content: center; }
      .mode-tab { flex: 1; text-align: center; padding: 9px 8px; font-size: 0.75rem; }

      .status-pill { font-size: 0.72rem; padding: 7px 12px; }

      .viewfinder-outer, .result-panel { margin: 0 2px; }

      .viewfinder, .generator-preview { border-radius: 26px; }

      .generator-preview { padding: 16px; }

      .gen-input-group {
        flex-direction: column;
        margin: 12px 2px 0;
      }

      .gen-input { width: 100%; }

      #gen-btn {
        flex: 1 1 auto !important;
        width: 100%;
      }

      .btn-group { padding: 8px 2px 4px; gap: 8px; }
      .btn { font-size: 0.78rem; padding: 13px 8px; min-width: 0; }
      .btn span.btn-label { display: inline; }

      .action-icons { gap: 6px; }
      .icon-btn { font-size: 0.68rem; padding: 10px 4px; min-width: 0; }
      .icon-btn i { font-size: 0.8rem; }

      .feature-chips { padding: 0 4px; gap: 8px; }
      .chip { font-size: 0.7rem; padding: 6px 10px; }
    }

    @media (max-width: 360px) {
      .brand h2 { font-size: 1.1rem; }
      .mode-tab { font-size: 0.7rem; padding: 8px 6px; }
      .icon-btn span { display: none; }
      .icon-btn { padding: 12px 6px; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="glass">
      <div class="header-row">
        <div class="brand">
          <i class="fa-solid fa-qrcode"></i>
          <h2>QR Pro</h2>
        </div>
        <div class="mode-tabs">
          <button class="mode-tab active" id="tab-scanner"><i class="fa-solid fa-camera"></i> Scan</button>
          <button class="mode-tab" id="tab-generator"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</button>
        </div>
        <div class="status-pill">
          <span class="live-dot" id="live-dot"></span>
          <span id="status-text">Ready</span>
        </div>
      </div>
    </div>

    <!-- Scanner View -->
    <div id="scanner-view" class="active">
      <div class="viewfinder-outer">
        <div class="viewfinder" id="viewfinder">
          <video id="qr-video" autoplay playsinline muted></video>
          <canvas id="qr-canvas"></canvas>
          <div class="frame-corners">
            <i class="fa-solid fa-caret-up"></i>
            <i class="fa-solid fa-caret-up corner-tr" style="transform: rotate(90deg);"></i>
            <i class="fa-solid fa-caret-down corner-bl" style="transform: rotate(-90deg);"></i>
            <i class="fa-solid fa-caret-down" style="transform: rotate(180deg);"></i>
          </div>
          <div class="scan-laser" id="scan-laser"></div>
        </div>
      </div>

      <div class="feature-chips">
        <div class="chip"><i class="fa-solid fa-wifi"></i> Offline</div>
        <div class="chip"><i class="fa-solid fa-camera-retro"></i> Dual Cam</div>
        <div class="chip"><i class="fa-solid fa-image"></i> Upload</div>
        <div class="chip"><i class="fa-solid fa-bolt"></i> Fast</div>
      </div>

      <div class="btn-group">
        <button class="btn primary" id="start-btn"><i class="fa-solid fa-play"></i> <span class="btn-label">Scan</span></button>
        <button class="btn" id="switch-btn"><i class="fa-solid fa-arrows-rotate"></i> <span class="btn-label">Flip</span></button>
        <button class="btn" id="upload-btn"><i class="fa-solid fa-upload"></i> <span class="btn-label">Image</span></button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none;">
    </div>

    <!-- Generator View -->
    <div id="generator-view">
      <div class="viewfinder-outer">
        <div class="generator-preview" id="generator-preview">
          <div id="generated-qr">
            <div class="generator-placeholder" id="generator-placeholder">
              <i class="fa-solid fa-qrcode"></i>
              টেক্সট বা URL লিখে QR কোড তৈরি করুন
            </div>
          </div>
        </div>
      </div>
      <div class="gen-input-group">
        <input type="text" class="gen-input" id="gen-text" placeholder="Enter text or URL to generate QR..." maxlength="1000">
        <button class="btn primary" id="gen-btn" style="flex:0 0 auto; padding:14px 24px;"><i class="fa-solid fa-wand-magic-sparkles"></i> <span class="btn-label">Generate</span></button>
      </div>
      <div class="btn-group">
        <button class="btn" id="download-qr" disabled><i class="fa-solid fa-download"></i> <span class="btn-label">Download</span></button>
        <button class="btn" id="print-qr" disabled><i class="fa-solid fa-print"></i> <span class="btn-label">Print</span></button>
      </div>
    </div>

    <!-- Result panel (shared) -->
    <div class="glass result-panel">
      <div class="label-row">
        <span><i class="fa-solid fa-barcode"></i> Scanned Data</span>
        <button class="history-badge" id="history-count" aria-label="Toggle scan history">0 scans</button>
      </div>
      <div class="result-box" id="result-text">Waiting for QR code...</div>
      <div class="action-icons">
        <button class="icon-btn" id="copy-btn" disabled><i class="fa-solid fa-copy"></i> <span>Copy</span></button>
        <button class="icon-btn" id="open-btn" disabled><i class="fa-solid fa-arrow-up-right-from-square"></i> <span>Open</span></button>
        <button class="icon-btn" id="share-btn" disabled><i class="fa-solid fa-share-nodes"></i> <span>Share</span></button>
        <button class="icon-btn" id="history-toggle"><i class="fa-solid fa-list"></i> <span>Log</span></button>
        <button class="icon-btn" id="clear-btn" disabled><i class="fa-solid fa-trash"></i> <span>Clear</span></button>
      </div>
      <div class="footer-msg" id="live-msg" role="status" aria-live="polite">Align QR within frame or upload image</div>
      <div class="history-dropdown" id="history-dropdown"></div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ────────── DOM Elements ──────────
      const video = document.getElementById('qr-video');
      const canvas = document.getElementById('qr-canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const startBtn = document.getElementById('start-btn');
      const switchBtn = document.getElementById('switch-btn');
      const uploadBtn = document.getElementById('upload-btn');
      const fileInput = document.getElementById('file-input');
      const resultText = document.getElementById('result-text');
      const copyBtn = document.getElementById('copy-btn');
      const openBtn = document.getElementById('open-btn');
      const shareBtn = document.getElementById('share-btn');
      const historyToggle = document.getElementById('history-toggle');
      const clearBtn = document.getElementById('clear-btn');
      const historyDropdown = document.getElementById('history-dropdown');
      const historyCountBtn = document.getElementById('history-count');
      const liveMsg = document.getElementById('live-msg');
      const statusText = document.getElementById('status-text');
      const liveDot = document.getElementById('live-dot');
      const viewfinder = document.getElementById('viewfinder');
      const scanLaser = document.getElementById('scan-laser');

      // Generator elements
      const tabScanner = document.getElementById('tab-scanner');
      const tabGenerator = document.getElementById('tab-generator');
      const scannerView = document.getElementById('scanner-view');
      const generatorView = document.getElementById('generator-view');
      const genText = document.getElementById('gen-text');
      const genBtn = document.getElementById('gen-btn');
      const generatedQR = document.getElementById('generated-qr');
      const generatorPlaceholder = document.getElementById('generator-placeholder');
      const downloadBtn = document.getElementById('download-qr');
      const printBtn = document.getElementById('print-qr');

      // ────────── State ──────────
      let stream = null;
      let scanning = false;
      let animFrame = null;
      let facingMode = 'environment';
      let lastResult = '';
      let hasResult = false;          // FIX: explicit flag instead of matching text content
      let throttle = false;
      let scanHistory = [];
      let isImageMode = false;
      let currentQRDataURL = '';

      // ────────── Feature detection ──────────
      const hasMediaDevices = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
      const hasClipboardAPI = !!(navigator.clipboard && navigator.clipboard.writeText);
      const hasJsQR = typeof jsQR !== 'undefined';
      const hasQRCodeLib = typeof QRCode !== 'undefined';

      if (!hasMediaDevices) {
        startBtn.disabled = true;
        switchBtn.disabled = true;
      }
      if (!hasJsQR) {
        startBtn.disabled = true;
        switchBtn.disabled = true;
        uploadBtn.disabled = true;
      }
      if (!hasQRCodeLib) {
        genBtn.disabled = true;
      }

      // ────────── Tab Switching ──────────
      tabScanner.addEventListener('click', () => {
        tabScanner.classList.add('active');
        tabGenerator.classList.remove('active');
        scannerView.classList.add('active');
        generatorView.classList.remove('active');
        liveMsg.textContent = 'Align QR within frame or upload image';
      });

      tabGenerator.addEventListener('click', () => {
        tabGenerator.classList.add('active');
        tabScanner.classList.remove('active');
        scannerView.classList.remove('active');
        generatorView.classList.add('active');
        stopCamera();
        startBtn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="btn-label">Scan</span>';
        updateUI('Generator mode', false);
        liveMsg.textContent = hasQRCodeLib ? 'Enter text to generate QR code' : 'QR generator library failed to load — check your connection';
      });

      // ────────── Helper Functions ──────────
      function updateUI(status, active) {
        statusText.textContent = status;
        liveDot.className = active ? 'live-dot' : 'live-dot off';
        if (active && scanning) {
          viewfinder.classList.add('active-ring');
          scanLaser.style.display = 'block';
        } else {
          viewfinder.classList.remove('active-ring');
          if (!scanning && !isImageMode) scanLaser.style.display = 'none';
        }
      }

      function stopCamera() {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        if (animFrame) {
          cancelAnimationFrame(animFrame);
          animFrame = null;
        }
        scanning = false;
        video.srcObject = null;
        video.style.display = 'none';
        canvas.style.display = 'none';
        viewfinder.classList.remove('active-ring');
        scanLaser.style.display = 'none';
        isImageMode = false;
      }

      function setResultButtonsEnabled(enabled) {
        copyBtn.disabled = !enabled;
        openBtn.disabled = !enabled;
        shareBtn.disabled = !enabled;
        clearBtn.disabled = !enabled;
      }

      function addToHistory(data) {
        if (!data || data === lastResult) return;
        const entry = { text: data, time: new Date().toLocaleTimeString() };
        scanHistory.unshift(entry);
        if (scanHistory.length > 20) scanHistory.pop();
        updateHistoryUI();
      }

      function updateHistoryUI() {
        historyCountBtn.textContent = `${scanHistory.length} scan${scanHistory.length !== 1 ? 's' : ''}`;
        renderHistoryDropdown();
      }

      // FIX: build history rows with textContent/DOM nodes instead of innerHTML
      // to prevent stored XSS from a malicious QR payload.
      function renderHistoryDropdown() {
        historyDropdown.innerHTML = '';
        if (scanHistory.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'history-empty';
          empty.textContent = 'No history yet';
          historyDropdown.appendChild(empty);
          return;
        }
        scanHistory.slice(0, 8).forEach((item) => {
          const div = document.createElement('div');
          div.className = 'history-item';

          const textSpan = document.createElement('span');
          textSpan.textContent = item.text.length > 40 ? item.text.substring(0, 40) + '…' : item.text;

          const timeSpan = document.createElement('span');
          timeSpan.style.color = '#9b8ec0';
          timeSpan.style.fontSize = '0.7rem';
          timeSpan.style.flexShrink = '0';
          timeSpan.textContent = item.time;

          div.appendChild(textSpan);
          div.appendChild(timeSpan);

          div.addEventListener('click', () => {
            resultText.textContent = item.text;
            lastResult = item.text;
            hasResult = true;
            setResultButtonsEnabled(true);
            liveMsg.textContent = 'Loaded from history';
          });
          historyDropdown.appendChild(div);
        });
      }

      function decodeQRFromImageData(imageData) {
        if (!hasJsQR) return null;
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
        return code ? code.data : null;
      }

      function processScannedData(data) {
        if (!data || (throttle && data === lastResult)) return;
        lastResult = data;
        hasResult = true;
        resultText.textContent = data;
        setResultButtonsEnabled(true);
        addToHistory(data);
        liveMsg.textContent = '✅ QR Code detected!';
        throttle = true;
        setTimeout(() => { throttle = false; }, 2000);
      }

      // ────────── Camera Scanning ──────────
      function scanLoop() {
        if (!scanning) return;
        if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = decodeQRFromImageData(imageData);
          if (data) processScannedData(data);
        }
        if (scanning) animFrame = requestAnimationFrame(scanLoop);
      }

      // FIX: startCamera now returns true/false so callers know whether it actually
      // started, instead of the UI blindly assuming success.
      async function startCamera(mode) {
        stopCamera();

        if (!hasMediaDevices) {
          updateUI('Camera unavailable', false);
          liveMsg.textContent = 'Camera API not supported here (needs HTTPS / a supported browser)';
          return false;
        }
        if (!hasJsQR) {
          updateUI('Scanner unavailable', false);
          liveMsg.textContent = 'Scanner library failed to load — check your connection';
          return false;
        }

        try {
          const constraints = {
            video: { facingMode: { ideal: mode }, width: { ideal: 640 }, height: { ideal: 640 } },
            audio: false
          };
          stream = await navigator.mediaDevices.getUserMedia(constraints);
          video.srcObject = stream;
          video.style.display = 'block';
          canvas.style.display = 'none';
          await new Promise((resolve, reject) => {
            video.onloadedmetadata = resolve;
            setTimeout(() => reject(new Error('Camera timed out')), 8000);
          });
          await video.play();
          scanning = true;
          facingMode = mode;
          video.style.transform = mode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
          updateUI(mode === 'environment' ? 'Back Camera' : 'Front Camera', true);
          liveMsg.textContent = 'Scanning...';
          scanLaser.style.display = 'block';
          scanLoop();
          return true;
        } catch (err) {
          stopCamera();
          updateUI('Camera denied', false);
          liveMsg.textContent = err && err.name === 'NotAllowedError'
            ? 'Camera permission denied — allow access to scan'
            : 'Could not access camera on this device';
          return false;
        }
      }

      async function toggleScan() {
        if (scanning) {
          stopCamera();
          updateUI('Standby', false);
          startBtn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="btn-label">Scan</span>';
          liveMsg.textContent = 'Scanner paused';
          return;
        }

        startBtn.disabled = true;
        const started = await startCamera(facingMode);
        startBtn.disabled = !(hasMediaDevices && hasJsQR);
        // FIX: only flip the button to "Stop" state if the camera actually started.
        if (started) {
          startBtn.innerHTML = '<i class="fa-solid fa-stop"></i> <span class="btn-label">Stop</span>';
        } else {
          startBtn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="btn-label">Scan</span>';
        }
      }

      async function switchCamera() {
        const newMode = facingMode === 'environment' ? 'user' : 'environment';
        if (scanning) {
          const started = await startCamera(newMode);
          startBtn.innerHTML = started
            ? '<i class="fa-solid fa-stop"></i> <span class="btn-label">Stop</span>'
            : '<i class="fa-solid fa-play"></i> <span class="btn-label">Scan</span>';
        } else {
          facingMode = newMode;
          updateUI(newMode === 'environment' ? 'Back (ready)' : 'Front (ready)', false);
        }
      }

      // ────────── Image Upload ──────────
      function handleImageUpload(file) {
        if (!file) return;
        if (!hasJsQR) {
          liveMsg.textContent = 'Scanner library failed to load — check your connection';
          return;
        }
        stopCamera();
        isImageMode = true;
        scanLaser.style.display = 'none';
        updateUI('Image mode', false);
        liveMsg.textContent = 'Decoding image...';
        const reader = new FileReader();
        reader.onerror = function() {
          liveMsg.textContent = 'Could not read that file';
        };
        reader.onload = function(e) {
          const img = new Image();
          img.onerror = function() {
            liveMsg.textContent = 'That file is not a readable image';
          };
          img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            canvas.style.display = 'block';
            video.style.display = 'none';
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = decodeQRFromImageData(imageData);
            if (data) {
              processScannedData(data);
              liveMsg.textContent = '✅ QR decoded from image';
            } else {
              liveMsg.textContent = 'No QR found in image';
              resultText.textContent = 'No QR code detected in image';
              hasResult = false;
              setResultButtonsEnabled(false);
            }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // ────────── QR Generator ──────────
      // FIX: instead of guessing with a fixed setTimeout (race condition), read the
      // canvas qrcodejs draws internally the moment it's created — no arbitrary delay,
      // and it works even if the library's fallback <img> hasn't finished rendering.
      function generateQR() {
        if (!hasQRCodeLib) {
          liveMsg.textContent = 'QR generator library failed to load — check your connection';
          return;
        }
        const text = genText.value.trim();
        if (!text) {
          liveMsg.textContent = 'Please enter text or URL';
          genText.focus();
          return;
        }

        generatedQR.innerHTML = '';
        currentQRDataURL = '';
        downloadBtn.disabled = true;
        printBtn.disabled = true;
        liveMsg.textContent = 'Generating...';

        try {
          new QRCode(generatedQR, {
            text: text,
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
          });
        } catch (err) {
          liveMsg.textContent = 'Failed to generate QR code';
          return;
        }

        requestAnimationFrame(() => {
          const canvasEl = generatedQR.querySelector('canvas');
          const imgEl = generatedQR.querySelector('img');
          if (canvasEl) {
            try {
              currentQRDataURL = canvasEl.toDataURL('image/png');
            } catch (e) {
              currentQRDataURL = imgEl ? imgEl.src : '';
            }
          } else if (imgEl && imgEl.src) {
            currentQRDataURL = imgEl.src;
          }

          if (currentQRDataURL) {
            downloadBtn.disabled = false;
            printBtn.disabled = false;
            liveMsg.textContent = 'QR code generated successfully!';
          } else {
            liveMsg.textContent = 'QR generation failed — try again';
          }
        });
      }

      function downloadQR() {
        if (!currentQRDataURL) {
          liveMsg.textContent = 'Generate a QR code first';
          return;
        }
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = currentQRDataURL;
        document.body.appendChild(link);
        link.click();
        link.remove();
        liveMsg.textContent = 'QR code downloaded!';
      }

      // FIX: no more closing the print window immediately after calling print()
      // (which raced against the print dialog actually opening). We wait for the
      // image to load, then trigger print, and close only after the print flow ends.
      function printQR() {
        if (!currentQRDataURL) {
          liveMsg.textContent = 'Generate a QR code first';
          return;
        }
        const win = window.open('', '_blank');
        if (!win) {
          liveMsg.textContent = 'Please allow pop-ups to print';
          return;
        }
        win.document.title = 'Print QR Code';
        win.document.body.style.margin = '0';
        win.document.body.style.display = 'flex';
        win.document.body.style.alignItems = 'center';
        win.document.body.style.justifyContent = 'center';
        win.document.body.style.minHeight = '100vh';

        const img = win.document.createElement('img');
        img.src = currentQRDataURL;
        img.style.maxWidth = '90%';
        img.style.display = 'block';
        img.onload = () => {
          win.focus();
          win.print();
        };
        win.addEventListener('afterprint', () => win.close());
        win.document.body.appendChild(img);
      }

      // ────────── Action Buttons ──────────
      function copyText() {
        if (!hasResult) return;
        const t = resultText.textContent;
        if (hasClipboardAPI) {
          navigator.clipboard.writeText(t).then(() => {
            liveMsg.textContent = '📋 Copied!';
          }).catch(() => fallbackCopy(t));
        } else {
          fallbackCopy(t);
        }
      }

      function fallbackCopy(t) {
        try {
          const ta = document.createElement('textarea');
          ta.value = t;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          liveMsg.textContent = '📋 Copied!';
        } catch (e) {
          liveMsg.textContent = 'Copy not supported on this device';
        }
      }

      function openLink() {
        if (!hasResult) return;
        let t = resultText.textContent.trim();
        if (!/^https?:\/\//i.test(t)) {
          if (/^[\w-]+(\.[\w-]+)+/i.test(t)) t = 'https://' + t;
          else { liveMsg.textContent = 'Not a valid URL'; return; }
        }
        // FIX: lightweight confirmation before following a link decoded from an
        // untrusted QR code, so users see the real destination first.
        const proceed = window.confirm('Open this link?\n\n' + t);
        if (proceed) {
          window.open(t, '_blank', 'noopener,noreferrer');
        }
      }

      function shareResult() {
        if (!hasResult) return;
        const t = resultText.textContent;
        if (navigator.share) {
          navigator.share({ text: t }).catch(() => {});
        } else if (hasClipboardAPI) {
          navigator.clipboard.writeText(t).then(() => {
            liveMsg.textContent = 'Link copied (share not supported)';
          });
        } else {
          fallbackCopy(t);
          liveMsg.textContent = 'Link copied (share not supported)';
        }
      }

      function toggleHistoryPanel() {
        historyDropdown.classList.toggle('show');
      }

      function clearResult() {
        resultText.textContent = 'Waiting for QR code...';
        lastResult = '';
        hasResult = false;
        setResultButtonsEnabled(false);
        liveMsg.textContent = 'Result cleared';
      }

      // ────────── Event Listeners ──────────
      startBtn.addEventListener('click', toggleScan);
      switchBtn.addEventListener('click', switchCamera);
      uploadBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleImageUpload(e.target.files[0]);
        fileInput.value = '';
      });
      copyBtn.addEventListener('click', copyText);
      openBtn.addEventListener('click', openLink);
      shareBtn.addEventListener('click', shareResult);
      historyToggle.addEventListener('click', toggleHistoryPanel);
      historyCountBtn.addEventListener('click', toggleHistoryPanel);
      clearBtn.addEventListener('click', clearResult);
      genBtn.addEventListener('click', generateQR);
      downloadBtn.addEventListener('click', downloadQR);
      printBtn.addEventListener('click', printQR);

      // Generate on Enter key
      genText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') generateQR();
      });

      window.addEventListener('beforeunload', stopCamera);
      // FIX: stop the camera when the tab/app goes into background to save battery
      // and avoid a stuck "active" camera indicator.
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && scanning) {
          stopCamera();
          startBtn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="btn-label">Scan</span>';
          updateUI('Paused (in background)', false);
        }
      });

      // Initial state
      updateUI('Ready', false);
      scanLaser.style.display = 'none';
      setResultButtonsEnabled(false);
      updateHistoryUI();

      if (!hasMediaDevices) {
        liveMsg.textContent = 'Camera not supported here — you can still upload an image';
      } else if (!hasJsQR) {
        liveMsg.textContent = 'Scanner library failed to load — check your connection and reload';
      }
    })();
  </script>
</body>
</html>
