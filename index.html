<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>QR Scanner & Generator Pro</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- jsQR library for scanning -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js">
  </script>
  <!-- QRCode.js for generating -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
  </script>
  <style>
    :root {
      --bg-primary: #06060c;
      --glass-bg: rgba(16, 16, 28, 0.65);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f0e6ff;
      --text-secondary: #a99bc7;
      --accent: #b794ff;
      --accent-dark: #5b3f9b;
      --danger: #f87171;
      --success: #4ade80;
      --radius-lg: 34px;
      --radius-md: 22px;
      --radius-sm: 16px;
      --spacing-xs: 6px;
      --spacing-sm: 12px;
      --spacing-md: 16px;
      --spacing-lg: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      background-image: 
        radial-gradient(ellipse at 20% 20%, #1a1030 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, #0f1a2e 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, #0a0a14 0%, #030308 100%);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .app-container {
      width: 100%;
      max-width: 500px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      animation: fadeSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glass panel */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    /* Header */
    .header-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-sm);
      padding: clamp(14px, 4vw, 20px) clamp(16px, 4vw, 24px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: clamp(8px, 2vw, 12px);
    }

    .brand i {
      font-size: clamp(1.5rem, 5vw, 2rem);
      color: var(--accent);
      filter: drop-shadow(0 0 14px #8b5cf6);
      background: linear-gradient(135deg, #3b2d60, #1e1638);
      padding: clamp(8px, 2vw, 10px);
      border-radius: var(--radius-sm);
    }

    .brand h2 {
      font-weight: 650;
      font-size: clamp(1.3rem, 5vw, 1.8rem);
      letter-spacing: -0.4px;
      background: linear-gradient(135deg, #ede4ff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .mode-tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 30px;
      padding: 3px;
    }

    .mode-tab {
      padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 16px);
      border-radius: 26px;
      font-size: clamp(0.7rem, 2.5vw, 0.85rem);
      font-weight: 600;
      cursor: pointer;
      color: var(--text-secondary);
      transition: 0.2s;
      border: none;
      background: transparent;
      white-space: nowrap;
    }

    .mode-tab.active {
      background: var(--accent-dark);
      color: #fff;
      box-shadow: 0 4px 14px rgba(139, 92, 246, 0.4);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.04);
      padding: clamp(6px, 2vw, 8px) clamp(12px, 3vw, 18px);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: clamp(0.7rem, 2.5vw, 0.85rem);
      font-weight: 500;
      color: #cfc0ff;
      white-space: nowrap;
    }

    .live-dot {
      width: clamp(7px, 2vw, 9px);
      height: clamp(7px, 2vw, 9px);
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 12px var(--success);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    .live-dot.off {
      background: var(--danger);
      box-shadow: 0 0 10px var(--danger);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.25); }
    }

    /* Scanner View */
    #scanner-view, #generator-view {
      display: none;
    }
    #scanner-view.active, #generator-view.active {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .viewfinder-outer {
      width: 100%;
      max-width: 100%;
    }

    .viewfinder {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #020108;
      border-radius: clamp(24px, 6vw, 38px);
      overflow: hidden;
      box-shadow: 0 0 0 3px rgba(138, 110, 255, 0.5), 0 25px 45px #000000aa;
      transition: all 0.3s;
    }

    .viewfinder.active-ring {
      box-shadow: 0 0 0 4px var(--accent), 0 0 30px #7c3aed;
    }

    #qr-video, #qr-canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    #qr-canvas {
      display: none;
    }

    .frame-corners i {
      position: absolute;
      color: #c4b5fd;
      font-size: clamp(24px, 6vw, 36px);
      filter: drop-shadow(0 0 15px #a78bfa);
      opacity: 0.9;
      z-index: 2;
    }
    .fa-caret-up { top: 14px; left: 14px; }
    .fa-caret-down { bottom: 14px; right: 14px; }
    .corner-tr { top: 14px; right: 14px; }
    .corner-bl { bottom: 14px; left: 14px; }

    .scan-laser {
      position: absolute;
      left: 5%;
      width: 90%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d8b4fe, var(--accent), #d8b4fe, transparent);
      box-shadow: 0 0 35px #c084fc;
      animation: laserSweep 2.8s ease-in-out infinite;
      border-radius: 4px;
      z-index: 2;
    }

    @keyframes laserSweep {
      0% { top: 10%; opacity: 0.6; }
      50% { top: 85%; opacity: 1; }
      100% { top: 10%; opacity: 0.6; }
    }

    /* Generator preview */
    .generator-preview {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #fff;
      border-radius: clamp(24px, 6vw, 38px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 0 3px rgba(138, 110, 255, 0.5);
      padding: clamp(16px, 4vw, 24px);
    }

    #generated-qr {
      max-width: 100%;
      max-height: 100%;
    }
    #generated-qr img {
      max-width: 100%;
      height: auto;
    }

    .gen-input-group {
      display: flex;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
    }

    .gen-input {
      flex: 1;
      min-width: 200px;
      background: rgba(20, 15, 35, 0.9);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: clamp(20px, 5vw, 30px);
      padding: clamp(12px, 3vw, 14px) clamp(14px, 3vw, 18px);
      color: var(--text-primary);
      font-size: clamp(0.8rem, 3vw, 0.95rem);
      outline: none;
    }

    .gen-input::placeholder {
      color: #7b6b9e;
    }

    /* Feature chips */
    .feature-chips {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(6px, 2vw, 10px);
    }

    .chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: clamp(6px, 2vw, 8px) clamp(10px, 3vw, 14px);
      font-size: clamp(0.65rem, 2.2vw, 0.8rem);
      color: #d0c4ff;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    .chip i {
      font-size: clamp(0.8rem, 2.5vw, 0.95rem);
      color: var(--accent);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: clamp(8px, 2vw, 14px);
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 80px;
      background: rgba(25, 20, 40, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--text-primary);
      padding: clamp(12px, 3vw, 15px) clamp(10px, 3vw, 14px);
      border-radius: 60px;
      font-weight: 600;
      font-size: clamp(0.8rem, 2.8vw, 0.95rem);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(6px, 2vw, 8px);
      cursor: pointer;
      transition: all 0.2s;
      background: linear-gradient(135deg, rgba(35, 28, 55, 0.9), rgba(20, 15, 35, 0.9));
      box-shadow: 0 10px 22px rgba(0,0,0,0.5);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .btn i {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent-dark), #35245c);
      border-color: #b392f0;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.5);
    }

    .btn:active {
      transform: scale(0.95);
      background: #3f3165;
    }

    /* Result panel */
    .result-panel {
      padding: clamp(14px, 4vw, 18px) clamp(16px, 4vw, 20px);
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .label-row span:first-child {
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .history-badge {
      background: #2e2350;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      color: #d4c4ff;
      cursor: pointer;
      white-space: nowrap;
    }

    .result-box {
      background: rgba(5, 3, 15, 0.8);
      border-radius: var(--radius-md);
      padding: clamp(12px, 3vw, 14px) clamp(14px, 3vw, 18px);
      min-height: 50px;
      max-height: 80px;
      overflow-y: auto;
      border: 1px solid #4a3b6b;
      color: #e2d9ff;
      font-weight: 450;
      line-height: 1.4;
      word-break: break-word;
      backdrop-filter: blur(10px);
      font-size: clamp(0.8rem, 2.8vw, 0.95rem);
    }

    .action-icons {
      display: flex;
      gap: clamp(6px, 2vw, 10px);
      margin-top: var(--spacing-sm);
      flex-wrap: wrap;
    }

    .icon-btn {
      flex: 1;
      min-width: 50px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 40px;
      padding: clamp(10px, 2.5vw, 12px) clamp(8px, 2vw, 10px);
      color: #cfc1ff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-weight: 500;
      font-size: clamp(0.7rem, 2.5vw, 0.85rem);
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn i {
      font-size: clamp(0.8rem, 2.5vw, 0.95rem);
    }

    .icon-btn:active {
      background: #5b478b;
      border-color: #c9b3ff;
    }

    .footer-msg {
      text-align: center;
      font-size: clamp(0.65rem, 2.2vw, 0.8rem);
      color: #7b6b9e;
      margin-top: var(--spacing-sm);
    }

    /* History dropdown */
    .history-dropdown {
      background: #141024;
      border-radius: 20px;
      margin-top: var(--spacing-xs);
      padding: 10px;
      max-height: 120px;
      overflow-y: auto;
      display: none;
      border: 1px solid #3d3060;
    }
    .history-dropdown.show {
      display: block;
    }
    .history-item {
      padding: 8px 12px;
      border-bottom: 1px solid #2d234a;
      color: #cfc0ff;
      font-size: clamp(0.7rem, 2.3vw, 0.85rem);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .history-item:hover, .history-item:active {
      background: #2a1f45;
    }

    /* Mobile-specific adjustments */
    @media (max-width: 380px) {
      .header-row {
        flex-direction: column;
        align-items: stretch;
      }
      .brand {
        justify-content: center;
      }
      .mode-tabs {
        justify-content: center;
      }
      .status-pill {
        justify-content: center;
      }
      .btn {
        font-size: 0.75rem;
        padding: 10px 8px;
      }
      .icon-btn {
        font-size: 0.7rem;
        padding: 8px 6px;
      }
      .feature-chips {
        justify-content: center;
      }
    }

    @media (min-width: 381px) and (max-width: 480px) {
      .header-row {
        gap: 8px;
      }
    }

    @media (min-width: 768px) {
      .app-container {
        max-width: 550px;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="glass">
      <div class="header-row">
        <div class="brand">
          <i class="fa-solid fa-qrcode"></i>
          <h2>QR Pro</h2>
        </div>
        <div class="mode-tabs">
          <button class="mode-tab active" id="tab-scanner"><i class="fa-solid fa-camera"></i> Scan</button>
          <button class="mode-tab" id="tab-generator"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</button>
        </div>
        <div class="status-pill">
          <span class="live-dot" id="live-dot"></span>
          <span id="status-text">Ready</span>
        </div>
      </div>
    </div>

    <!-- Scanner View -->
    <div id="scanner-view" class="active">
      <div class="viewfinder-outer">
        <div class="viewfinder" id="viewfinder">
          <video id="qr-video" autoplay playsinline muted></video>
          <canvas id="qr-canvas"></canvas>
          <div class="frame-corners">
            <i class="fa-solid fa-caret-up"></i>
            <i class="fa-solid fa-caret-up corner-tr" style="transform: rotate(90deg);"></i>
            <i class="fa-solid fa-caret-down corner-bl" style="transform: rotate(-90deg);"></i>
            <i class="fa-solid fa-caret-down" style="transform: rotate(180deg);"></i>
          </div>
          <div class="scan-laser" id="scan-laser"></div>
        </div>
      </div>

      <div class="feature-chips">
        <div class="chip"><i class="fa-solid fa-wifi"></i> Offline</div>
        <div class="chip"><i class="fa-solid fa-camera-retro"></i> Dual Cam</div>
        <div class="chip"><i class="fa-solid fa-image"></i> Upload</div>
        <div class="chip"><i class="fa-solid fa-bolt"></i> Fast</div>
      </div>

      <div class="btn-group">
        <button class="btn primary" id="start-btn"><i class="fa-solid fa-play"></i> Scan</button>
        <button class="btn" id="switch-btn"><i class="fa-solid fa-arrows-rotate"></i> Flip</button>
        <button class="btn" id="upload-btn"><i class="fa-solid fa-upload"></i> Image</button>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none;">
    </div>

    <!-- Generator View -->
    <div id="generator-view">
      <div class="viewfinder-outer">
        <div class="generator-preview" id="generator-preview">
          <div id="generated-qr"></div>
        </div>
      </div>
      <div class="gen-input-group">
        <input type="text" class="gen-input" id="gen-text" placeholder="Enter text or URL...">
        <button class="btn primary" id="gen-btn" style="flex:0 0 auto;"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</button>
      </div>
      <div class="btn-group">
        <button class="btn" id="download-qr"><i class="fa-solid fa-download"></i> Save</button>
        <button class="btn" id="print-qr"><i class="fa-solid fa-print"></i> Print</button>
      </div>
    </div>

    <!-- Result panel -->
    <div class="glass result-panel">
      <div class="label-row">
        <span><i class="fa-solid fa-barcode"></i> Scanned Data</span>
        <span class="history-badge" id="history-count">0 scans</span>
      </div>
      <div class="result-box" id="result-text">Waiting for QR code...</div>
      <div class="action-icons">
        <button class="icon-btn" id="copy-btn"><i class="fa-solid fa-copy"></i> Copy</button>
        <button class="icon-btn" id="open-btn"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open</button>
        <button class="icon-btn" id="share-btn"><i class="fa-solid fa-share-nodes"></i> Share</button>
        <button class="icon-btn" id="history-toggle"><i class="fa-solid fa-list"></i> Log</button>
        <button class="icon-btn" id="clear-btn"><i class="fa-solid fa-trash"></i> Clear</button>
      </div>
      <div class="footer-msg" id="live-msg">Align QR within frame or upload image</div>
      <div class="history-dropdown" id="history-dropdown"></div>
    </div>
  </div>

  <script>
    (function() {
      // ────────── DOM Elements ──────────
      const video = document.getElementById('qr-video');
      const canvas = document.getElementById('qr-canvas');
      const ctx = canvas.getContext('2d');
      const startBtn = document.getElementById('start-btn');
      const switchBtn = document.getElementById('switch-btn');
      const uploadBtn = document.getElementById('upload-btn');
      const fileInput = document.getElementById('file-input');
      const resultText = document.getElementById('result-text');
      const copyBtn = document.getElementById('copy-btn');
      const openBtn = document.getElementById('open-btn');
      const shareBtn = document.getElementById('share-btn');
      const historyToggle = document.getElementById('history-toggle');
      const clearBtn = document.getElementById('clear-btn');
      const historyDropdown = document.getElementById('history-dropdown');
      const historyCountSpan = document.getElementById('history-count');
      const liveMsg = document.getElementById('live-msg');
      const statusText = document.getElementById('status-text');
      const liveDot = document.getElementById('live-dot');
      const viewfinder = document.getElementById('viewfinder');
      const scanLaser = document.getElementById('scan-laser');
      
      // Generator elements
      const tabScanner = document.getElementById('tab-scanner');
      const tabGenerator = document.getElementById('tab-generator');
      const scannerView = document.getElementById('scanner-view');
      const generatorView = document.getElementById('generator-view');
      const genText = document.getElementById('gen-text');
      const genBtn = document.getElementById('gen-btn');
      const generatedQR = document.getElementById('generated-qr');
      const downloadBtn = document.getElementById('download-qr');
      const printBtn = document.getElementById('print-qr');

      // ────────── State ──────────
      let stream = null;
      let scanning = false;
      let animFrame = null;
      let facingMode = 'environment';
      let lastResult = '';
      let throttle = false;
      let scanHistory = [];
      let isImageMode = false;
      let currentQRDataURL = '';

      // ────────── Tab Switching ──────────
      tabScanner.addEventListener('click', () => {
        tabScanner.classList.add('active');
        tabGenerator.classList.remove('active');
        scannerView.classList.add('active');
        generatorView.classList.remove('active');
        stopCamera();
        updateUI('Ready', false);
        liveMsg.textContent = 'Align QR within frame or upload image';
      });

      tabGenerator.addEventListener('click', () => {
        tabGenerator.classList.add('active');
        tabScanner.classList.remove('active');
        scannerView.classList.remove('active');
        generatorView.classList.add('active');
        stopCamera();
        updateUI('Generator mode', false);
        liveMsg.textContent = 'Enter text to generate QR code';
      });

      // ────────── Helper Functions ──────────
      function updateUI(status, active) {
        statusText.textContent = status;
        liveDot.className = active ? 'live-dot' : 'live-dot off';
        if (active && scanning) {
          viewfinder.classList.add('active-ring');
          scanLaser.style.display = 'block';
        } else {
          viewfinder.classList.remove('active-ring');
          if (!scanning && !isImageMode) scanLaser.style.display = 'none';
        }
      }

      function stopCamera() {
        if (stream) {
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }
        if (animFrame) {
          cancelAnimationFrame(animFrame);
          animFrame = null;
        }
        scanning = false;
        video.srcObject = null;
        video.style.display = 'none';
        canvas.style.display = 'none';
        viewfinder.classList.remove('active-ring');
        scanLaser.style.display = 'none';
        isImageMode = false;
      }

      function addToHistory(data) {
        if (!data || data === lastResult) return;
        const entry = { text: data, time: new Date().toLocaleTimeString() };
        scanHistory.unshift(entry);
        if (scanHistory.length > 20) scanHistory.pop();
        updateHistoryUI();
      }

      function updateHistoryUI() {
        historyCountSpan.textContent = `${scanHistory.length} scan${scanHistory.length !== 1 ? 's' : ''}`;
        renderHistoryDropdown();
      }

      function renderHistoryDropdown() {
        historyDropdown.innerHTML = '';
        if (scanHistory.length === 0) {
          historyDropdown.innerHTML = '<div style="padding:10px;color:#7b6b9e;">No history yet</div>';
          return;
        }
        scanHistory.slice(0, 8).forEach((item) => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `<span>${item.text.substring(0, 40)}</span><span style="color:#9b8ec0;font-size:0.7rem;">${item.time}</span>`;
          div.addEventListener('click', () => {
            resultText.textContent = item.text;
            lastResult = item.text;
            liveMsg.textContent = 'Loaded from history';
          });
          historyDropdown.appendChild(div);
        });
      }

      function decodeQRFromImageData(imageData) {
        if (typeof jsQR === 'undefined') return null;
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
        return code ? code.data : null;
      }

      function processScannedData(data) {
        if (!data || (throttle && data === lastResult)) return;
        lastResult = data;
        resultText.textContent = data;
        addToHistory(data);
        liveMsg.textContent = '✅ QR Code detected!';
        throttle = true;
        setTimeout(() => { throttle = false; }, 2000);
      }

      // ────────── Camera Scanning ──────────
      function scanLoop() {
        if (!scanning) return;
        if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = decodeQRFromImageData(imageData);
          if (data) processScannedData(data);
        }
        if (scanning) animFrame = requestAnimationFrame(scanLoop);
      }

      async function startCamera(mode) {
        stopCamera();
        try {
          const constraints = {
            video: { facingMode: { ideal: mode }, width: { ideal: 640 }, height: { ideal: 640 } },
            audio: false
          };
          stream = await navigator.mediaDevices.getUserMedia(constraints);
          video.srcObject = stream;
          video.style.display = 'block';
          canvas.style.display = 'none';
          await new Promise(r => video.onloadedmetadata = r);
          await video.play();
          scanning = true;
          facingMode = mode;
          video.style.transform = mode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
          updateUI(mode === 'environment' ? 'Back Camera' : 'Front Camera', true);
          liveMsg.textContent = 'Scanning...';
          scanLaser.style.display = 'block';
          scanLoop();
        } catch (err) {
          updateUI('Camera denied', false);
          liveMsg.textContent = 'Allow camera permission';
        }
      }

      async function toggleScan() {
        if (scanning) {
          stopCamera();
          updateUI('Standby', false);
          startBtn.innerHTML = '<i class="fa-solid fa-play"></i> Scan';
          liveMsg.textContent = 'Scanner paused';
        } else {
          await startCamera(facingMode);
          startBtn.innerHTML = '<i class="fa-solid fa-stop"></i> Stop';
        }
      }

      async function switchCamera() {
        const newMode = facingMode === 'environment' ? 'user' : 'environment';
        if (scanning) {
          stopCamera();
          await startCamera(newMode);
          startBtn.innerHTML = '<i class="fa-solid fa-stop"></i> Stop';
        } else {
          facingMode = newMode;
          updateUI(newMode === 'environment' ? 'Back (ready)' : 'Front (ready)', false);
        }
      }

      // ────────── Image Upload ──────────
      function handleImageUpload(file) {
        if (!file) return;
        stopCamera();
        isImageMode = true;
        scanLaser.style.display = 'none';
        updateUI('Image mode', false);
        liveMsg.textContent = 'Decoding image...';
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            canvas.style.display = 'block';
            video.style.display = 'none';
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = decodeQRFromImageData(imageData);
            if (data) {
              processScannedData(data);
              liveMsg.textContent = '✅ QR decoded from image';
            } else {
              liveMsg.textContent = 'No QR found in image';
              resultText.textContent = 'No QR code detected in image';
            }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // ────────── QR Generator ──────────
      function generateQR() {
        const text = genText.value.trim();
        if (!text) {
          liveMsg.textContent = 'Please enter text or URL';
          return;
        }
        generatedQR.innerHTML = '';
        new QRCode(generatedQR, {
          text: text,
          width: 256,
          height: 256,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H
        });
        
        setTimeout(() => {
          const img = generatedQR.querySelector('img');
          if (img) {
            currentQRDataURL = img.src;
            liveMsg.textContent = 'QR code generated successfully!';
          }
        }, 300);
      }

      function downloadQR() {
        if (!currentQRDataURL) {
          liveMsg.textContent = 'Generate a QR code first';
          return;
        }
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = currentQRDataURL;
        link.click();
        liveMsg.textContent = 'QR code downloaded!';
      }

      function printQR() {
        if (!currentQRDataURL) {
          liveMsg.textContent = 'Generate a QR code first';
          return;
        }
        const win = window.open('');
        win.document.write(`<img src="${currentQRDataURL}" style="display:block;margin:auto;max-width:100%;">`);
        win.document.title = 'Print QR Code';
        win.print();
        win.close();
      }

      // ────────── Action Buttons ──────────
      function copyText() {
        const t = resultText.textContent;
        if (!t || t.includes('Waiting')) return;
        navigator.clipboard.writeText(t).then(() => {
          liveMsg.textContent = '📋 Copied!';
        }).catch(() => liveMsg.textContent = 'Copy failed');
      }

      function openLink() {
        let t = resultText.textContent.trim();
        if (!t || t.includes('Waiting')) return;
        if (!/^https?:\/\//i.test(t)) {
          if (/^[\w\-]+\.[a-z]{2,}/i.test(t)) t = 'https://' + t;
          else { liveMsg.textContent = 'Not a valid URL'; return; }
        }
        window.open(t, '_blank', 'noopener,noreferrer');
      }

      function shareResult() {
        const t = resultText.textContent;
        if (!t || t.includes('Waiting')) return;
        if (navigator.share) {
          navigator.share({ text: t }).catch(() => {});
        } else {
          navigator.clipboard.writeText(t).then(() => {
            liveMsg.textContent = 'Link copied (share not supported)';
          });
        }
      }

      function toggleHistoryPanel() {
        historyDropdown.classList.toggle('show');
      }

      function clearResult() {
        resultText.textContent = 'Waiting for QR code...';
        lastResult = '';
        liveMsg.textContent = 'Result cleared';
      }

      // ────────── Event Listeners ──────────
      startBtn.addEventListener('click', toggleScan);
      switchBtn.addEventListener('click', switchCamera);
      uploadBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) handleImageUpload(e.target.files[0]);
      });
      copyBtn.addEventListener('click', copyText);
      openBtn.addEventListener('click', openLink);
      shareBtn.addEventListener('click', shareResult);
      historyToggle.addEventListener('click', toggleHistoryPanel);
      clearBtn.addEventListener('click', clearResult);
      genBtn.addEventListener('click', generateQR);
      downloadBtn.addEventListener('click', downloadQR);
      printBtn.addEventListener('click', printQR);
      
      genText.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') generateQR();
      });

      window.addEventListener('beforeunload', stopCamera);

      // Initial state
      updateUI('Ready', false);
      scanLaser.style.display = 'none';
    })();
  </script>
</body>
</html>
